name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          ext=""
          if [ "$goos" = "windows" ]; then
            ext=".exe"
          fi

          binary="orchestrator-${goos}-${goarch}${ext}"

          go build \
            -trimpath \
            -ldflags "-s -w -X issue-orchestrator/internal/version.Version=${GITHUB_REF_NAME} -X issue-orchestrator/internal/version.Commit=${GITHUB_SHA} -X issue-orchestrator/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${binary}" \
            ./cmd/orchestrator

          {
            echo "GOOS=${goos}"
            echo "GOARCH=${goarch}"
            echo "BINARY=${binary}"
          } >> "$GITHUB_ENV"

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/orchestrator-${GOOS}-${GOARCH}.tar.gz"
          tar -C dist -czf "$archive" "$BINARY"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "dist/orchestrator-$env:GOOS-$env:GOARCH.zip"
          Compress-Archive -Path "dist/$env:BINARY" -DestinationPath $archive
          "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ env.GOARCH }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
